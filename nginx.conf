# Nginx Configuration for Buildora VPS
# Location: /etc/nginx/sites-available/buildora

# 1. Backend API Route
server {
    listen 80;
    server_name api.buildora.live;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

# 2. Merchant Dashboard Route
server {
    listen 80;
    server_name app.buildora.live dashboard.buildora.live;

    location / {
        proxy_pass http://localhost:3001; # Routes directly to Merchant Frontend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

# 3. SaaS Portal & Wildcard Storefront Route
server {
    listen 80;
    # Crucial: Catches main domain AND all wildcard subdomains (e.g., custom-store.buildora.live)
    server_name buildora.live www.buildora.live *.buildora.live;

    location / {
        proxy_pass http://localhost:3000; # Routes to SaaS Portal for routing resolution
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host; # Highly important for middleware subdomain extraction!
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
