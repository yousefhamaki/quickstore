version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: buildora_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
    container_name: buildora_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Point this to your backend's .env file
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - redis

  saas-portal:
    build:
      context: ./frontend
      # Next.js monorepos typically build from the frontend root
      dockerfile: apps/saas-portal/Dockerfile
    container_name: buildora_saas_portal
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=https://api.buildora.live
      - NEXT_PUBLIC_DASHBOARD_URL=https://app.buildora.live
    ports:
      - "3000:3000"

  merchant-dashboard:
    build:
      context: ./frontend
      dockerfile: apps/merchant-dashboard/Dockerfile
    container_name: buildora_merchant_dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=https://api.buildora.live
      - NEXT_PUBLIC_DOMAIN=buildora.live
    ports:
      - "3001:3001"

volumes:
  redis_data:
